name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check . || true        # start permissive; tighten as you clean up
      - name: Unit tests (feature logic)
        run: pytest -q
# NOTE: this validates CODE. The MODEL-quality gate (champion vs challenger) runs in
# Databricks (notebook 06), because that's where the registry and data live. On a paid
# tier you'd add a job here that uses a Databricks PAT + the CLI to trigger 06 remotely.
